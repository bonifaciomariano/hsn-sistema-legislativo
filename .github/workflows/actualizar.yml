name: Actualizar datos legislativos

on:
  schedule:
    # 12:00 Argentina (UTC-3) = 15:00 UTC, lunes a viernes
    - cron: "0 15 * * 1-5"
    # 20:00 Argentina (UTC-3) = 23:00 UTC, lunes a viernes
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scraper de proyectos
        run: python scripts/scraper_proyectos.py

      - name: Scraper de DPP (comisiones)
        continue-on-error: true
        run: python scripts/scraper_dpp.py

      - name: Scraper de agenda (boletines)
        continue-on-error: true
        run: python scripts/scraper_agenda.py

      - name: Generar web
        run: python scripts/generar_web.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios; nada que commitear."
          else
            git commit -m "Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
